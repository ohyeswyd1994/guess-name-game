<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>猜人名 · 局域网版</title>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --card: #1e293b;
    --card2: #334155;
    --primary: #6366f1;
    --primary2: #818cf8;
    --success: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: var(--text);
    overflow-x: hidden;
  }
  #app {
    min-height: 100vh;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1, h2, h3 { font-weight: 600; }
  .title {
    text-align: center;
    margin: 12px 0 24px;
    font-size: 28px;
    background: linear-gradient(135deg, #818cf8, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .card h3 {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 12px;
    font-weight: 500;
  }
  input, button, textarea {
    font-family: inherit;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    outline: none;
    transition: all 0.2s;
  }
  input, textarea {
    background: var(--bg);
    color: var(--text);
    padding: 12px 14px;
    width: 100%;
  }
  input:focus, textarea:focus {
    border-color: var(--primary2);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
  }
  button {
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
  }
  button:hover:not(:disabled) { background: var(--primary2); transform: translateY(-1px); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.ghost:hover:not(:disabled) { background: var(--card2); }
  button.success { background: var(--success); }
  button.success:hover:not(:disabled) { background: #34d399; }
  button.danger { background: var(--danger); }
  button.warn { background: var(--warn); color: #1e293b; }

  .row { display: flex; gap: 8px; align-items: center; }
  .row > input { flex: 1; }
  .grid { display: grid; gap: 8px; }
  .muted { color: var(--text-dim); font-size: 13px; }
  .center { text-align: center; }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;
    background: var(--card2);
    color: var(--text-dim);
  }
  .badge.host { background: #f59e0b; color: #1e293b; font-weight: 600; }
  .badge.me { background: var(--primary); color: white; }
  .badge.guessed { background: var(--success); color: white; }
  .badge.ok { background: var(--success); color: white; }
  .badge.waiting { background: var(--warn); color: #1e293b; }

  .player-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .player-row .name { font-weight: 500; }
  .player-row .tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .player-row.spectator { opacity: 0.7; }
  .badge.spectator { background: #6b7280; color: white; }

  .kick-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 2px 10px;
    font-size: 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .kick-btn:hover {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
  }

  .host-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .host-actions button {
    flex: 1;
    min-width: 120px;
    font-size: 13px;
    padding: 8px 12px;
  }

  .target-board {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    text-align: center;
    padding: 28px 20px;
    border-radius: 16px;
    margin-bottom: 16px;
    box-shadow: 0 8px 30px rgba(99,102,241,0.3);
  }
  .target-board .tip { font-size: 13px; opacity: 0.85; margin-bottom: 8px; }
  .target-board .target-name { font-size: 32px; font-weight: 700; word-break: break-all; }
  .target-board.you {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    border: 2px dashed var(--primary2);
  }
  .target-board.you .target-name { font-size: 24px; color: var(--primary2); }

  .others-list { display: grid; gap: 8px; margin-bottom: 16px; }
  .other-card {
    background: var(--card);
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .other-card .who { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
  .other-card .what { font-size: 18px; font-weight: 600; }
  .other-card.guessed { opacity: 0.5; }
  .other-card.guessed .what { text-decoration: line-through; }

  .question-card {
    background: var(--bg);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 8px;
    border-left: 3px solid var(--primary2);
  }
  .question-card.guess { border-left-color: var(--warn); }
  .question-card.guess.correct { border-left-color: var(--success); }
  .question-card.guess.wrong { border-left-color: var(--danger); }
  .question-card.system { border-left-color: var(--text-dim); font-style: italic; color: var(--text-dim); }
  .question-card .head {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .question-card .text { font-size: 15px; line-height: 1.5; }
  .question-card .votes {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .question-card .vote-tag {
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--card2);
  }
  .vote-tag.yes { background: rgba(16,185,129,0.2); color: #34d399; }
  .vote-tag.no { background: rgba(239,68,68,0.2); color: #f87171; }
  .vote-tag.maybe { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .vote-tag.both { background: rgba(139,92,246,0.2); color: #a78bfa; }

  .vote-buttons {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .vote-buttons button { flex: 1; padding: 10px; }
  .vote-buttons .yes { background: var(--success); }
  .vote-buttons .no { background: var(--danger); }
  .vote-buttons .maybe { background: var(--warn); color: #1e293b; }
  .vote-buttons .both { background: #8b5cf6; }

  /* 投票选项（带评论输入框） */
  .vote-options {
    display: grid;
    gap: 8px;
    margin-top: 10px;
  }
  .vote-option-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .vote-option-row .vote-comment {
    flex: 1;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    min-width: 0;
  }
  .vote-option-row button {
    min-width: 110px;
    padding: 8px 14px;
    font-size: 14px;
    white-space: nowrap;
  }
  .vote-option-row .yes { background: var(--success); }
  .vote-option-row .no { background: var(--danger); }
  .vote-option-row .maybe { background: var(--warn); color: #1e293b; }
  .vote-option-row .both { background: #8b5cf6; }
  .vote-option.active .vote-comment {
    border-color: var(--primary2);
  }
  .vote-comment-bubble {
    margin-left: 4px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    font-style: italic;
    color: var(--text);
  }

  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .quick-questions .quick-q {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13px;
    line-height: 1.2;
  }
  .quick-questions .quick-q:hover:not(:disabled) {
    background: var(--card2);
    border-color: var(--primary2);
    color: var(--primary2);
  }

  .ask-area {
    background: var(--card);
    padding: 16px;
    border-radius: 14px;
    border: 2px solid var(--primary);
    margin-bottom: 16px;
  }
  .ask-area .label {
    font-size: 13px;
    color: var(--primary2);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .history-box {
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .history-box::-webkit-scrollbar { width: 6px; }
  .history-box::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 3px; }

  .history-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .history-tab {
    background: var(--bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .history-tab:hover {
    background: var(--card2);
    color: var(--text);
    transform: none;
  }
  .history-tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .history-tab .tab-count {
    background: rgba(255,255,255,0.15);
    color: inherit;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
  }
  .history-tab.active .tab-count {
    background: rgba(255,255,255,0.3);
  }
  .history-tab:not(.active) .tab-count {
    background: var(--card2);
    color: var(--text-dim);
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translate(-50%, -10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ===== 聊天栏 ===== */
  .chat-fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
    color: white;
    border: none;
    cursor: pointer;
    z-index: 90;
    box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .chat-fab:hover { transform: scale(1.06); box-shadow: 0 10px 28px rgba(99,102,241,0.55); }
  .chat-fab:active { transform: scale(0.96); }
  .chat-fab .chat-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    background: var(--danger);
    color: white;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 2px var(--bg);
  }

  .chat-panel {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: min(360px, calc(100vw - 40px));
    max-width: 360px;
    height: min(480px, calc(100vh - 40px));
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    z-index: 91;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    overflow: hidden;
    animation: chatOpen 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes chatOpen {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
    color: white;
    font-weight: 600;
  }
  .chat-header button {
    background: transparent;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-list::-webkit-scrollbar { width: 5px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 3px; }

  .chat-msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
  .chat-msg .meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
    padding: 0 4px;
  }
  .chat-msg .meta .spectator-tag {
    background: #6b7280;
    color: white;
    padding: 0 5px;
    border-radius: 4px;
    font-size: 10px;
    margin-left: 4px;
  }
  .chat-msg .bubble {
    background: var(--bg);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    word-break: break-word;
  }
  .chat-msg.mine .bubble {
    background: var(--primary);
    color: white;
  }
  .chat-empty {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    margin: auto;
  }
  .chat-input-row {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .chat-input-row input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
  }
  .chat-input-row button {
    padding: 8px 14px;
    font-size: 13px;
  }

  /* ===== 猜中/猜错全屏弹窗 ===== */
  .splash-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .splash-overlay.with-bg {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    pointer-events: auto;
    animation: fadeInBg 0.3s ease;
  }
  @keyframes fadeInBg {
    from { opacity: 0; backdrop-filter: blur(0); }
    to { opacity: 1; }
  }

  .splash-card {
    text-align: center;
    padding: 36px 48px;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-width: 90vw;
    pointer-events: auto;
  }

  .splash-card.win {
    background: linear-gradient(135deg, #10b981 0%, #34d399 50%, #fbbf24 100%);
    color: white;
    animation: winPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .splash-card.lose {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    color: white;
    animation: loseShake 0.6s ease;
  }
  @keyframes winPop {
    0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60% { transform: scale(1.15) rotate(3deg); opacity: 1; }
    80% { transform: scale(0.95) rotate(-2deg); }
    100% { transform: scale(1) rotate(0); }
  }
  @keyframes loseShake {
    0%, 100% { transform: translateX(0) scale(1); opacity: 1; }
    10% { transform: translateX(-20px) scale(1.05); }
    20% { transform: translateX(20px) scale(1.05); }
    30% { transform: translateX(-15px) scale(1.02); }
    40% { transform: translateX(15px) scale(1.02); }
    50% { transform: translateX(-8px) scale(1); }
    60% { transform: translateX(8px) scale(1); }
    70% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }

  .splash-emoji {
    font-size: 96px;
    line-height: 1;
    margin-bottom: 12px;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  }
  .splash-card.win .splash-emoji {
    animation: emojiSpin 1.2s ease;
  }
  .splash-card.lose .splash-emoji {
    animation: emojiTilt 0.8s ease;
  }
  @keyframes emojiSpin {
    0% { transform: rotate(0) scale(0.5); }
    50% { transform: rotate(360deg) scale(1.3); }
    100% { transform: rotate(720deg) scale(1); }
  }
  @keyframes emojiTilt {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-25deg); }
    75% { transform: rotate(25deg); }
  }

  .splash-title {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .splash-sub {
    font-size: 18px;
    opacity: 0.95;
    margin-bottom: 4px;
  }
  .splash-name {
    font-size: 24px;
    font-weight: 700;
    margin-top: 8px;
    padding: 6px 18px;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    display: inline-block;
  }

  /* 红色闪屏（猜错时） */
  .lose-flash {
    position: fixed;
    inset: 0;
    background: rgba(239, 68, 68, 0.5);
    z-index: 199;
    pointer-events: none;
    animation: loseFlash 0.5s ease;
  }
  @keyframes loseFlash {
    0% { opacity: 0; }
    20% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* 礼花 */
  .confetti {
    position: fixed;
    z-index: 198;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .confetti span {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 14px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0.2;
    }
  }

  .footer-tip {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 20px;
    padding-bottom: 20px;
  }

  .end-banner {
    background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
    color: white;
    padding: 24px;
    border-radius: 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  .end-banner h2 { font-size: 24px; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="app">
  <h1 class="title">🎭 猜人名 · 额头贴贴版</h1>
  <div id="main"></div>
  <div class="footer-tip">在线游戏 · 2-6 人 · 房间唯一</div>
</div>
<div id="chat-root"></div>

<script>
const COMMON_QUESTIONS = [
  '我这个东西是人吗',
  '我这个人是魏蜀吴的吗',
  '我这个人是魏的吗',
  '我这个人是蜀的吗',
  '我这个人是吴的吗',
  '我这个人是上阵 kukuku 的吗',
];

let ws = null;
let myId = null;
let state = null;
let lastVoteChoice = {}; // questionId -> choice
let kickedReason = null; // 被踢/解散后展示用
let historyFilter = 'all'; // 'all' 或玩家 id
let lastSeenGuessTime = 0; // 已展示过动画的最新猜测时间戳
let chatOpen = false;
let chatLastSeenTime = 0; // 已读的最后一条聊天时间戳

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => { /* 等待用户输入名字加入 */ };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'joined') {
      myId = msg.youId;
      try { localStorage.setItem('lastName', currentJoinName || ''); } catch {}
    } else if (msg.type === 'state') {
      const prevState = state;
      const isFirstState = !prevState;
      state = msg.state;
      // 首次收到 state 时，把已有聊天标记为已读
      if (isFirstState) {
        const chats = state.history.filter(h => h.kind === 'chat');
        if (chats.length) chatLastSeenTime = chats[chats.length - 1].time;
      }
      // 检测新增的猜测记录，弹动画
      maybeTriggerGuessAnimation(prevState);
      render();
    } else if (msg.type === 'error') {
      showToast(msg.message);
    } else if (msg.type === 'info') {
      showToast(msg.message, 4500);
    } else if (msg.type === 'kicked') {
      kickedReason = msg.message || '你被移出了房间';
      // 服务端会主动 close 连接
    } else if (msg.type === 'disbanded') {
      kickedReason = msg.message || '房间已解散';
    }
  };
  ws.onclose = () => {
    if (kickedReason) {
      // 显示离开提示页面，不自动重连
      document.getElementById('main').innerHTML = `
        <div class="card center">
          <h3 style="margin-bottom:12px;">👋 ${escapeHtml(kickedReason)}</h3>
          <p class="muted" style="margin-bottom:16px;">如想重新加入，请刷新页面</p>
          <button onclick="location.reload()">刷新页面重新加入</button>
        </div>
      `;
      return;
    }
    showToast('与服务器断开连接，3 秒后重连…');
    setTimeout(() => location.reload(), 3000);
  };
}

function send(obj) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}

function showToast(msg, duration) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), duration || 2500);
}

// 检测有新的 guess 记录就弹动画
function maybeTriggerGuessAnimation(prevState) {
  if (!state || !state.history) return;
  const guesses = state.history.filter(h => h.kind === 'guess');
  if (guesses.length === 0) return;
  const newest = guesses[guesses.length - 1];
  if (newest.time <= lastSeenGuessTime) return;
  // 首次连接：把历史里所有已有 guess 视为已看过，不触发
  if (lastSeenGuessTime === 0 && !prevState) {
    lastSeenGuessTime = newest.time;
    return;
  }
  lastSeenGuessTime = newest.time;
  // 自己 vs 别人
  const isMine = newest.playerId === myId;
  showGuessSplash({
    correct: !!newest.correct,
    name: newest.playerName,
    guess: newest.guess,
    target: newest.target,
    isMine,
  });
}

function showGuessSplash({ correct, name, guess, target, isMine }) {
  // 移除可能残留的旧动画
  document.querySelectorAll('.splash-overlay, .lose-flash, .confetti').forEach(n => n.remove());

  if (correct) {
    // 礼花
    spawnConfetti();
    // 弹窗
    const overlay = document.createElement('div');
    overlay.className = 'splash-overlay with-bg';
    overlay.innerHTML = `
      <div class="splash-card win">
        <span class="splash-emoji">🎉</span>
        <div class="splash-title">${isMine ? '你猜中啦！' : '猜中啦！'}</div>
        <div class="splash-sub">${isMine ? '太厉害了 👏' : escapeHtml(name) + ' 猜对了'}</div>
        <div class="splash-name">${escapeHtml(guess)}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = () => overlay.remove();
    setTimeout(() => overlay.remove(), 3500);
  } else {
    // 红色闪屏
    const flash = document.createElement('div');
    flash.className = 'lose-flash';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 500);
    // 摇头动画弹窗
    const overlay = document.createElement('div');
    overlay.className = 'splash-overlay with-bg';
    overlay.innerHTML = `
      <div class="splash-card lose">
        <span class="splash-emoji">😅</span>
        <div class="splash-title">${isMine ? '猜错了！' : '猜错啦'}</div>
        <div class="splash-sub">${isMine ? '回合结束，下一位继续' : escapeHtml(name) + ' 没猜中'}</div>
        <div class="splash-name">猜的是：${escapeHtml(guess)}</div>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.onclick = () => overlay.remove();
    setTimeout(() => overlay.remove(), 3000);
  }
}

function spawnConfetti() {
  const colors = ['#fbbf24', '#34d399', '#60a5fa', '#f472b6', '#a78bfa', '#fb923c', '#22d3ee'];
  const wrap = document.createElement('div');
  wrap.className = 'confetti';
  const N = 80;
  for (let i = 0; i < N; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + 'vw';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.animationDuration = (2 + Math.random() * 2) + 's';
    s.style.animationDelay = (Math.random() * 0.5) + 's';
    s.style.transform = `rotate(${Math.random() * 360}deg)`;
    s.style.width = (6 + Math.random() * 8) + 'px';
    s.style.height = (10 + Math.random() * 8) + 'px';
    wrap.appendChild(s);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 4500);
}

function renderJoin() {

    <div class="card">

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let lastPhase = null;
function render() {
  if (!myId || !state) return;
  // 阶段切换时重置历史筛选
  if (lastPhase !== state.phase) {
    historyFilter = 'all';
    lastPhase = state.phase;
  }
  if (state.phase === 'lobby') renderLobby();
  else if (state.phase === 'assigning') renderAssigning();
  else if (state.phase === 'playing') renderPlaying();
  else if (state.phase === 'ended') renderEnded();
  // 不论哪个阶段，都把聊天浮窗渲染出来
  renderChat();
}

// ========== 聊天栏 ==========
function getChatMessages() {
  if (!state || !state.history) return [];
  return state.history.filter(h => h.kind === 'chat');
}

function renderChat() {
  const root = document.getElementById('chat-root');
  if (!root) return;
  const msgs = getChatMessages();
  // 未读数（最后一条聊天时间 > chatLastSeenTime 且不是自己发的）
  const unread = chatOpen
    ? 0
    : msgs.filter(m => m.time > chatLastSeenTime && m.playerId !== myId).length;

  if (chatOpen) {
    // 打开聊天，更新已读标记
    if (msgs.length > 0) chatLastSeenTime = msgs[msgs.length - 1].time;
    root.innerHTML = `
      <div class="chat-panel">
        <div class="chat-header">
          <span>💬 聊天 · ${msgs.length}</span>
          <button id="chatClose" title="关闭">×</button>
        </div>
        <div class="chat-list" id="chatList">
          ${msgs.length === 0 ? `<div class="chat-empty">还没有人说话，来打个招呼吧 👋</div>` : msgs.map(m => `
            <div class="chat-msg ${m.playerId === myId ? 'mine' : ''}">
              <div class="meta">
                ${m.playerId === myId ? '你' : escapeHtml(m.playerName)}
                ${m.isSpectator ? '<span class="spectator-tag">观众</span>' : ''}
                · ${formatTime(m.time)}
              </div>
              <div class="bubble">${escapeHtml(m.text)}</div>
            </div>
          `).join('')}
        </div>
        <div class="chat-input-row">
          <input id="chatInput" maxlength="200" placeholder="输入聊天内容…" />
          <button id="chatSend">发送</button>
        </div>
      </div>
    `;
    // 滚动到底部
    setTimeout(() => {
      const list = document.getElementById('chatList');
      if (list) list.scrollTop = list.scrollHeight;
    }, 0);
    // 绑定
    document.getElementById('chatClose').onclick = () => { chatOpen = false; renderChat(); };
    const inp = document.getElementById('chatInput');
    if (inp) {
      inp.focus();
      const sendChat = () => {
        const text = inp.value.trim();
        if (!text) return;
        send({ type: 'chat', text });
        inp.value = '';
      };
      document.getElementById('chatSend').onclick = sendChat;
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
    }
  } else {
    // 折叠：显示一个圆形按钮
    root.innerHTML = `
      <button class="chat-fab" id="chatFab" title="打开聊天">
        💬${unread > 0 ? `<span class="chat-badge">${unread > 99 ? '99+' : unread}</span>` : ''}
      </button>
    `;
    document.getElementById('chatFab').onclick = () => {
      chatOpen = true;
      // 标记已读
      if (msgs.length > 0) chatLastSeenTime = msgs[msgs.length - 1].time;
      renderChat();
    };
  }
}

function renderLobby() {

      inp.focus();
      const ask = () => {
        const text = inp.value.trim();
        if (!text) { showToast('请输入问题'); return; }
        send({ type: 'ask', text });
        inp.value = '';
      };
      const askBtn = document.getElementById('askBtn');
      if (askBtn && !askBtn.disabled) askBtn.onclick = ask;
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
    }
    // 快捷问题
    if (!turnAsked) {
      document.querySelectorAll('[data-quick]').forEach(btn => {
        btn.onclick = () => {
          const i = +btn.getAttribute('data-quick');
          const text = COMMON_QUESTIONS[i];
          if (!text) return;
          send({ type: 'ask', text });
        };
      });
    }
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn && !nextBtn.disabled) nextBtn.onclick = () => {
      if (!confirm('确定本回合不猜，跳过吗？')) return;
      send({ type: 'nextAsker' });
    };

    const gi = document.getElementById('guessInput');
    if (gi && !gi.disabled) {
      const guess = () => {
        const v = gi.value.trim();
        if (!v) { showToast('请输入猜测'); return; }
        if (!confirm(`确定要猜 "${v}" 吗？\n\n⚠️ 注意：猜错的话本回合会立刻结束！`)) return;
        send({ type: 'guess', guess: v });
        gi.value = '';
      };
      document.getElementById('guessBtn').onclick = guess;
      gi.addEventListener('keydown', e => { if (e.key === 'Enter') guess(); });
    }
  }

  // 投票绑定（带评论）
  document.querySelectorAll('[data-vote]').forEach(btn => {
    btn.onclick = () => {
      const choice = btn.getAttribute('data-vote');
      const qid = btn.getAttribute('data-qid');
      const inp = document.querySelector(`[data-vote-comment="${choice}"]`);
      const comment = inp ? inp.value.trim() : '';
      send({ type: 'vote', choice, questionId: qid, comment });
    };
  });
  // 输入框 Enter 也直接投票
  document.querySelectorAll('[data-vote-comment]').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const choice = inp.getAttribute('data-vote-comment');
        const btn = document.querySelector(`[data-vote="${choice}"]`);
        if (btn) btn.click();
      }
    });
  });

  if (isHost) bindHostActions();
  bindKickButtons();
  bindHistoryTabs();
}

// 统一的投票项归一化：兼容旧格式（string id）和新格式（{id, comment}）
function normalizeVoteItem(item) {
  if (typeof item === 'string') return { id: item, comment: '' };
  return { id: item.id, comment: item.comment || '' };
}
function voteItemsOf(q, kind) {
  return (q.votes[kind] || []).map(normalizeVoteItem);
}
function myVoteKind(q) {
  const kinds = ['yes', 'no', 'maybe', 'both'];
  return kinds.find(k => voteItemsOf(q, k).some(v => v.id === myId));
}
function myVoteComment(q, kind) {
  const item = voteItemsOf(q, kind).find(v => v.id === myId);
  return item ? item.comment : '';
}

const VOTE_OPTIONS = [
  { key: 'yes',   icon: '✅', label: '是',       cls: 'yes',   activeOutline: 'white' },
  { key: 'no',    icon: '❌', label: '否',       cls: 'no',    activeOutline: 'white' },
  { key: 'both',  icon: '🌗', label: '是也不是', cls: 'both',  activeOutline: 'white' },
  { key: 'maybe', icon: '🤷', label: '不确定',   cls: 'maybe', activeOutline: '#1e293b' },
];

function renderVoteUI(q, me) {
  if (!me) return '';
  const myKind = myVoteKind(q);
  return `
    <div style="margin-top:10px;">
      <div class="muted" style="margin-bottom:6px;">${escapeHtml(q.askerName)} 问：</div>
      <div style="font-size:16px; padding:10px; background:var(--bg); border-radius:8px;">${escapeHtml(q.text)}</div>
      <div class="vote-options" data-qid="${q.questionId}">
        ${VOTE_OPTIONS.map(opt => {
          const active = myKind === opt.key;
          const myComment = active ? myVoteComment(q, opt.key) : '';
          return `
            <div class="vote-option ${opt.cls} ${active ? 'active' : ''}">
              <div class="vote-option-row">
                <input type="text" class="vote-comment" data-vote-comment="${opt.key}" maxlength="80" placeholder="加一句备注（可选）" value="${escapeHtml(myComment)}" />
                <button class="${opt.cls}" data-vote="${opt.key}" data-qid="${q.questionId}" ${active ? `style="outline:3px solid ${opt.activeOutline};"` : ''}>${opt.icon} ${opt.label}</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="muted" style="margin-top:6px;font-size:12px;">${voteSummary(q)}</div>
    </div>
  `;
}

function voteSummary(q) {
  const y = voteItemsOf(q, 'yes').length;
  const n = voteItemsOf(q, 'no').length;
  const b = voteItemsOf(q, 'both').length;
  const m = voteItemsOf(q, 'maybe').length;
  return `当前投票 · ✅ ${y} · ❌ ${n} · 🌗 ${b} · 🤷 ${m}`;
}

function renderHistoryItem(h) {
  if (h.kind === 'question') {
    const renderVoteList = (kind) => {
      const items = voteItemsOf(h, kind);
      if (items.length === 0) return '—';
      return items.map(v => {
        const name = nameOf(v.id);
        return v.comment
          ? `${escapeHtml(name)}<span class="vote-comment-bubble">"${escapeHtml(v.comment)}"</span>`
          : escapeHtml(name);
      }).join('、');
    };
    return `
      <div class="question-card">
        <div class="head">
          <span><b>${escapeHtml(h.askerName)}</b> 提问</span>
          <span>${formatTime(h.time)}</span>
        </div>
        <div class="text">${escapeHtml(h.text)}</div>
        <div class="votes">
          <span class="vote-tag yes">✅ ${voteItemsOf(h,'yes').length} (${renderVoteList('yes')})</span>
          <span class="vote-tag no">❌ ${voteItemsOf(h,'no').length} (${renderVoteList('no')})</span>
          <span class="vote-tag both">🌗 ${voteItemsOf(h,'both').length} (${renderVoteList('both')})</span>
          <span class="vote-tag maybe">🤷 ${voteItemsOf(h,'maybe').length} (${renderVoteList('maybe')})</span>
        </div>
      </div>
    `;
  }
  if (h.kind === 'guess') {
    return `
      <div class="question-card guess ${h.correct ? 'correct' : 'wrong'}">
        <div class="head">
          <span><b>${escapeHtml(h.playerName)}</b> ${h.correct ? '猜中啦 🎉' : '猜错了 😅'}</span>
          <span>${formatTime(h.time)}</span>
        </div>
        <div class="text">猜测：${escapeHtml(h.guess)}${h.correct ? `（正确答案：${escapeHtml(h.target || '')}）` : ''}</div>
      </div>
    `;
  }
  if (h.kind === 'system') {
    return `<div class="question-card system"><div class="text">${escapeHtml(h.text)}</div></div>`;
  }
  return '';
}

function nameOf(id) {
  const p = state.players.find(p => p.id === id);
  return p ? p.name : '？';
}

// 判断某条历史记录是否与某个玩家相关
function historyBelongsToPlayer(h, playerId) {
  if (h.kind === 'question') return h.askerId === playerId;
  if (h.kind === 'guess') return h.playerId === playerId;
  return false;
}

// 渲染历史记录区（带 tab 切换）
function historySectionHtml() {
  // 排除观众，只为正式玩家提供 tab
  const playerTabs = state.players.filter(p => !p.isSpectator);
  // 如果当前选中的玩家已不在房间（被踢/掉线），重置为 all
  if (historyFilter !== 'all' && !state.players.find(p => p.id === historyFilter)) {
    historyFilter = 'all';
  }
  const filtered = historyFilter === 'all'
    ? state.history
    : state.history.filter(h => historyBelongsToPlayer(h, historyFilter) || h.kind === 'system');

  // 计数（每个玩家相关的提问+猜测条数）
  const countOf = id => state.history.filter(h => historyBelongsToPlayer(h, id)).length;

  return `
    <div class="history-tabs">
      <button class="history-tab ${historyFilter === 'all' ? 'active' : ''}" data-htab="all">
        全部 <span class="tab-count">${state.history.filter(h => h.kind !== 'system').length}</span>
      </button>
      ${playerTabs.map(p => `
        <button class="history-tab ${historyFilter === p.id ? 'active' : ''}" data-htab="${p.id}">
          ${escapeHtml(p.name)}${p.id === myId ? '(你)' : ''} <span class="tab-count">${countOf(p.id)}</span>
        </button>
      `).join('')}
    </div>
    <div class="history-box">
      ${[...filtered].reverse().map(h => renderHistoryItem(h)).join('') || `<p class="muted">${historyFilter === 'all' ? '暂无' : '该玩家暂无记录'}</p>`}
    </div>
  `;
}

function bindHistoryTabs() {
  document.querySelectorAll('[data-htab]').forEach(btn => {
    btn.onclick = () => {
      historyFilter = btn.getAttribute('data-htab');
      render(); // 重新渲染整页
    };
  });
}

function formatTime(t) {
  const d = new Date(t);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function renderEnded() {
  const me = state.players.find(p => p.id === myId);
  const isHost = me && me.isHost;
  const youAreSpectator = !!state.youAreSpectator;
  document.getElementById('main').innerHTML = `
    <div class="end-banner">
      <h2>🎊 本局结束！</h2>
      <p>${youAreSpectator ? '看看正式玩家这局的成绩 ↓' : '所有人都猜中啦，看看大家的成绩 ↓'}</p>
    </div>

    <div class="card">
      <h3>📋 结果</h3>
      <div class="grid">
        ${state.players.filter(p => !p.isSpectator).map(p => `
          <div class="player-row">
            <span class="name">${escapeHtml(p.name)}${p.id === myId ? ' (你)' : ''}</span>
            <span class="tags">
              <span class="badge">额头：${escapeHtml(p.id === myId ? (state.yourTarget || '') : (state.viewTargets.find(v=>v.id===p.id)?.target || ''))}</span>
              ${p.guessed ? '<span class="badge guessed">猜中</span>' : '<span class="badge">未猜中</span>'}
            </span>
          </div>
        `).join('')}
      </div>
      ${state.players.some(p => p.isSpectator) ? `
        <p class="muted" style="margin-top:10px;font-size:12px;">观众：${state.players.filter(p => p.isSpectator).map(p => escapeHtml(p.name)).join('、')}</p>
      ` : ''}
    </div>

    <div class="card">
      <h3>📜 全场记录</h3>
      ${historySectionHtml()}
    </div>

    ${isHost ? `
      <div class="card center">
        <button id="restartBtn" class="success">🔄 再来一局</button>
        <div class="host-actions">
          <button id="disbandBtn" class="ghost">🚪 解散房间</button>
        </div>
      </div>
    ` : `
      <div class="card center">
        <p class="muted">⏳ 等待房主开始下一局…</p>
      </div>
    `}
  `;
  if (isHost) {
    document.getElementById('restartBtn').onclick = () => send({ type: 'restart' });
    bindHostActions();
  }
  bindHistoryTabs();
}

renderJoin();
connect();
</script>
</body>
</html>
